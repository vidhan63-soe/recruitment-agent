version: "3.9"

# ============================================================
# RecruitAI — Docker Compose
#
# Quick start (local dev):
#   docker compose up --build
#
# Production deploy (with GPU pass-through):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./vectorstore:/app/vectorstore
      - ./logs:/app/logs
      - ./recruitment.db:/app/recruitment.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vectorstore:
  logs:
